<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>右键搜索 - 设置</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
    }
    .engine-list {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .engine-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .engine-item.dragging {
      opacity: 0.6;
    }
    .engine-item.engine-placeholder {
      border: none;
      background: transparent;
      padding: 0;
    }
    .engine-item .drag-handle {
      width: 24px;
      height: 24px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fafafa;
      color: #666;
      cursor: grab;
      font-size: 14px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      flex-shrink: 0;
    }
    .engine-item .drag-handle:active {
      cursor: grabbing;
    }
    .engine-item:last-child {
      border-bottom: none;
    }
    .engine-item .checkbox-label {
      color: #666;
      font-size: 14px;
      white-space: nowrap;
    }
    .engine-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }
    .engine-item input[type="text"] {
      flex: 1;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .engine-item .name-input {
      width: 120px;
    }
    .engine-item .url-input {
      flex: 1;
    }
    .engine-item .move-up,
    .engine-item .move-down {
      padding: 6px 10px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .engine-item .move-up:hover,
    .engine-item .move-down:hover {
      background: #1976D2;
    }
    .engine-item .move-up:disabled,
    .engine-item .move-down:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .engine-item .delete {
      padding: 8px 12px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .engine-item .delete:hover {
      background: #cc0000;
    }
    .add-form {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
    .add-form .name-input {
      width: 120px;
      flex-shrink: 0;
    }
    .add-form .url-input {
      flex: 1;
    }
    .add-form input {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .add-form button {
      padding: 8px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .add-form button:hover {
      background: #45a049;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .actions button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-primary {
      background: #2196F3;
      color: white;
    }
    .btn-primary:hover {
      background: #1976D2;
    }
    .btn-secondary {
      background: #9e9e9e;
      color: white;
    }
    .btn-secondary:hover {
      background: #757575;
    }
    .hint {
      color: #666;
      font-size: 12px;
      margin-top: 5px;
    }

    /* ElementUI 风格确认框样式 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .modal-overlay.hidden {
      display: none;
    }
    .el-message-box {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
      width: 420px;
      overflow: hidden;
    }
    .el-message-box__header {
      padding: 20px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .el-message-box__title {
      font-size: 18px;
      font-weight: 500;
      color: #303133;
    }
    .el-message-box__closebtn {
      font-size: 20px;
      color: #909399;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
    }
    .el-message-box__closebtn:hover {
      color: #409EFF;
    }
    .el-message-box__content {
      padding: 10px 20px 20px;
      font-size: 14px;
      color: #606266;
      line-height: 1.5;
    }
    .el-message-box__status {
      font-size: 24px;
      vertical-align: middle;
      margin-right: 10px;
    }
    .el-message-box__status.el-message-box-icon--warning {
      color: #E6A23C;
    }
    .el-message-box__status.el-message-box-icon--info {
      color: #909399;
    }
    .el-message-box__btns {
      padding: 10px 20px 20px;
      text-align: right;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .el-button {
      padding: 9px 20px;
      font-size: 14px;
      border-radius: 4px;
      border: 1px solid #DCDFE6;
      background: white;
      color: #606266;
      cursor: pointer;
      transition: all 0.2s;
    }
    .el-button:hover {
      color: #409EFF;
      border-color: #409EFF;
    }
    .el-button--primary {
      background: #409EFF;
      border-color: #409EFF;
      color: white;
    }
    .el-button--primary:hover {
      background: #66B1FF;
      border-color: #66B1FF;
    }

    /* ElementUI 风格消息提示 */
    .el-message {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 12px 16px;
      border-radius: 4px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
      display: flex;
      align-items: center;
      z-index: 10000;
      transition: opacity 0.3s, transform 0.3s;
    }
    .el-message.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(-20px);
      pointer-events: none;
    }
    .el-message__icon {
      font-size: 18px;
      margin-right: 10px;
    }
    .el-message--success {
      border: 1px solid #67C23A;
    }
    .el-message--success .el-message__icon {
      color: #67C23A;
    }
    .el-message--error {
      border: 1px solid #F56C6C;
    }
    .el-message--error .el-message__icon {
      color: #F56C6C;
    }
    .el-message__content {
      font-size: 14px;
      color: #606266;
    }
  </style>
</head>
<body>
  <h1>搜索引擎设置</h1>
  <p class="hint">可拖动每行左侧手柄调整搜索引擎顺序。</p>
  
  <div class="engine-list" id="engineList">
  </div>

  <div class="add-form">
    <input type="text" id="newName" placeholder="搜索引擎名称" class="name-input">
    <input type="text" id="newUrl" placeholder="URL（使用 {q} 占位符）" class="url-input">
    <button id="addBtn">添加搜索引擎</button>
  </div>
  <p class="hint">示例：https://www.google.com/search?q={q}</p>

  <div class="actions">
    <button id="saveBtn" class="btn-primary">保存修改</button>
    <button id="resetBtn" class="btn-secondary">恢复默认</button>
  </div>



  <!-- ElementUI 风格消息提示 -->
  <div id="messageToast" class="el-message hidden">
    <span class="el-message__icon">✓</span>
    <span class="el-message__content" id="toastMessage"></span>
  </div>

  <script type="module" src="dist/options.js"></script>
</body>
</html>
